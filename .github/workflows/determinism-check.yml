name: Determinism Check
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repository tree is stable
        run: |
          find . -maxdepth 3 -type f | LC_ALL=C sort > /tmp/tree.txt
          test -s /tmp/tree.txt

      - name: Validate canonical fixture
        run: |
          python3 cli/validate_candidate_object.py fixtures/candidate-object.valid.json

      - name: Validate router fixture
        run: |
          python3 cli/validate_candidate_object.py fixtures/router-candidate.valid.json

      - name: Validate classification fixture
        run: |
          python3 cli/validate_candidate_object.py fixtures/classification-summary.valid.json

      - name: Validate topology fixture
        run: |
          python3 cli/validate_candidate_object.py fixtures/topology-summary.valid.json

      - name: Run contract test
        run: |
          python3 tests/test_candidate_object_contract.py

      - name: Run schema smoke test
        run: |
          python3 tests/test_candidate_object_schema_smoke.py

      - name: Run generator smoke test
        run: |
          python3 tests/test_generator_smoke.py

      - name: Run router smoke test
        run: |
          python3 tests/test_router_smoke.py

      - name: Run classifier smoke test
        run: |
          python3 tests/test_classifier_smoke.py

      - name: Run topology smoke test
        run: |
          python3 tests/test_topology_smoke.py
